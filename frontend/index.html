<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace Manager - Авторизация</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 400px;
            width: 90%;
            padding: 2rem;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h1 {
            font-size: 1.8rem;
            color: #333;
            margin-bottom: 0.5rem;
        }

        .auth-header p {
            color: #666;
            font-size: 0.95rem;
        }

        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 2rem;
            border-bottom: 2px solid #f0f0f0;
        }

        .tab-button {
            flex: 1;
            padding: 1rem;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            color: #999;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab-button:hover {
            color: #667eea;
        }

        .tab-button.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #333;
            font-size: 0.95rem;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: border 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 0.75rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            font-weight: 600;
        }

        .loading.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <!-- Header -->
        <div class="auth-header">
            <h1>🏪 Marketplace Manager</h1>
            <p>Управление товарами на Ozon и Wildberries</p>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-button active" onclick="switchAuthTab('login')">Вход</button>
            <button class="tab-button" onclick="switchAuthTab('register')">Регистрация</button>
        </div>

        <!-- Alert Container -->
        <div id="alertContainer"></div>

        <!-- Login Tab -->
        <div id="login" class="tab-content active">
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label">Логин</label>
                    <input type="text" class="form-input" id="loginUsername" placeholder="Введи логин" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Пароль</label>
                    <input type="password" class="form-input" id="loginPassword" placeholder="Введи пароль" required>
                </div>

                <button type="submit" class="btn btn-primary">Войти</button>
                <div class="loading" id="loginLoading">Загрузка...</div>
            </form>
        </div>

        <!-- Register Tab -->
        <div id="register" class="tab-content">
            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label class="form-label">Логин</label>
                    <input type="text" class="form-input" id="regUsername" placeholder="Введи логин" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Пароль</label>
                    <input type="password" class="form-input" id="regPassword" placeholder="Минимум 6 символов" required minlength="6">
                </div>

                <div class="form-group">
                    <label class="form-label">Email (опционально)</label>
                    <input type="email" class="form-input" id="regEmail" placeholder="Введи email">
                </div>

                <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
                <div class="loading" id="regLoading">Загрузка...</div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin + '/api';

        // ===== CHECK IF ALREADY LOGGED IN =====
        // Проверяем при загрузке страницы
        window.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('access_token');
            
            // Если токен есть и валидный, переходим на dashboard
            if (token) {
                try {
                    const tokenData = JSON.parse(atob(token.split('.')[1]));
                    
                    // Проверяем, не истёк ли токен
                    if (tokenData.exp * 1000 > Date.now()) {
                        // Токен валидный, переходим на dashboard
                        window.location.replace('/dashboard.html');
                        return;
                    }
                } catch (e) {
                    console.error('Token error:', e);
                }
            }
            
            // Если токена нет или он невалидный, остаёмся на странице авторизации
        });

        // ===== TAB SWITCHING =====
        function switchAuthTab(tab) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
            
            // Show selected tab
            document.getElementById(tab).classList.add('active');
            document.querySelector(`[onclick="switchAuthTab('${tab}')"]`).classList.add('active');
            
            // Clear alerts
            document.getElementById('alertContainer').innerHTML = '';
        }

        // ===== LOGIN =====
        async function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!username || !password) {
                showAlert('Заполни логин и пароль', 'error');
                return;
            }

            showLoading('loginLoading', true);

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    
                    // Сохраняем токен
                    localStorage.setItem('access_token', data.access_token);
                    
                    // Сохраняем тему пользователя, если она есть в ответе
                    if (data.theme) {
                        localStorage.setItem('theme', data.theme);
                    }
                    
                    showAlert(`✅ Добро пожаловать, ${data.username}!`, 'success');
                    
                    // Переходим на dashboard через 0.5 секунды
                    setTimeout(() => {
                        window.location.replace('/dashboard.html');
                    }, 500);
                } else {
                    const error = await response.json();
                    showAlert(`❌ ${error.detail || 'Ошибка входа'}`, 'error');
                }
            } catch (e) {
                showAlert(`❌ Ошибка: ${e.message}`, 'error');
            } finally {
                showLoading('loginLoading', false);
            }
        }

        // ===== REGISTER =====
        async function handleRegister(event) {
            event.preventDefault();
            
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const email = document.getElementById('regEmail').value || null;
            
            if (!username || !password) {
                showAlert('Заполни логин и пароль', 'error');
                return;
            }

            if (password.length < 6) {
                showAlert('Пароль должен быть минимум 6 символов', 'error');
                return;
            }

            showLoading('regLoading', true);

            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password, email })
                });

                if (response.ok) {
                    const data = await response.json();
                    
                    // Сохраняем токен
                    localStorage.setItem('access_token', data.access_token);
                    
                    // Сохраняем тему пользователя, если она есть в ответе (по умолчанию light)
                    if (data.theme) {
                        localStorage.setItem('theme', data.theme);
                    } else {
                        localStorage.setItem('theme', 'light');
                    }
                    
                    showAlert(`✅ Аккаунт создан! Добро пожаловать, ${data.username}!`, 'success');
                    
                    // Переходим на dashboard через 0.5 секунды
                    setTimeout(() => {
                        window.location.replace('/dashboard.html');
                    }, 500);
                } else {
                    const error = await response.json();
                    showAlert(`❌ ${error.detail || 'Ошибка регистрации'}`, 'error');
                }
            } catch (e) {
                showAlert(`❌ Ошибка: ${e.message}`, 'error');
            } finally {
                showLoading('regLoading', false);
            }
        }

        // ===== UTILS =====
        function showAlert(message, type) {
            const container = document.getElementById('alertContainer');
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.textContent = message;
            container.appendChild(alertDiv);
            
            setTimeout(() => alertDiv.remove(), 4000);
        }

        function showLoading(elementId, show) {
            const el = document.getElementById(elementId);
            if (show) {
                el.classList.add('active');
            } else {
                el.classList.remove('active');
            }
        }
    </script>
</body>
</html>
