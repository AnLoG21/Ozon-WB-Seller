<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace Manager - Авторизация</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 400px;
            width: 90%;
            padding: 2rem;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h1 {
            font-size: 1.8rem;
            color: #333;
            margin-bottom: 0.5rem;
        }

        .auth-header p {
            color: #666;
            font-size: 0.95rem;
        }

        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 2rem;
            border-bottom: 2px solid #f0f0f0;
        }

        .tab-button {
            flex: 1;
            padding: 1rem;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            color: #999;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab-button:hover {
            color: #667eea;
        }

        .tab-button.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #333;
            font-size: 0.95rem;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: border 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 0.75rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.95rem;
            position: relative;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            font-weight: 600;
        }

        .loading.active {
            display: block;
        }

        /* Password Toggle Button */
        .password-toggle {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0.25rem;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .password-toggle:hover {
            opacity: 1;
        }

        /* Password Strength Indicator */
        .password-strength-container {
            margin-top: 0.5rem;
        }

        .password-strength-bar {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.25rem;
        }

        .password-strength-progress {
            flex: 1;
            height: 6px;
            background: #f0f0f0;
            border-radius: 3px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .password-strength-fill {
            height: 100%;
            border-radius: 3px;
            transition: all 0.3s ease;
        }

        .password-strength-label {
            font-weight: 600;
            font-size: 0.85rem;
            min-width: 100px;
            text-align: right;
        }

        .password-strength-feedback {
            color: #666;
            font-size: 0.8rem;
            margin-top: 0.25rem;
            line-height: 1.4;
        }

        .password-strength-feedback .requirement {
            display: inline-block;
            margin-right: 0.5rem;
        }

        .password-strength-feedback .requirement.met {
            color: #27ae60;
        }

        .password-strength-feedback .requirement.unmet {
            color: #e74c3c;
        }

        /* Input with icon */
        .form-input-with-icon {
            position: relative;
        }

        .form-input-with-icon .form-input {
            padding-right: 45px;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <!-- Header -->
        <div class="auth-header">
            <h1>🏪 Marketplace Manager</h1>
            <p>Управление товарами на Ozon и Wildberries</p>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-button active" onclick="switchAuthTab('login')">Вход</button>
            <button class="tab-button" onclick="switchAuthTab('register')">Регистрация</button>
        </div>

        <!-- Alert Container -->
        <div id="alertContainer"></div>

        <!-- Login Tab -->
        <div id="login" class="tab-content active">
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" id="loginEmail" placeholder="Введи email" required autocomplete="email" autofocus>
                </div>

                <div class="form-group">
                    <label class="form-label">Пароль</label>
                    <div class="form-input-with-icon">
                        <input type="password" class="form-input" id="loginPassword" placeholder="Введи пароль" required autocomplete="current-password">
                        <button type="button" class="password-toggle" onclick="togglePassword('loginPassword', this)" aria-label="Показать/скрыть пароль">👁️</button>
                    </div>
                </div>

                <div class="form-group" style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem;">
                    <label style="display: flex; align-items: center; cursor: pointer; font-weight: normal;">
                        <input type="checkbox" id="rememberMe" style="margin-right: 0.5rem;">
                        <span>Запомнить меня</span>
                    </label>
                    <a href="#" onclick="showForgotPassword(); return false;" style="color: #667eea; text-decoration: none; font-size: 0.9rem;">Забыли пароль?</a>
                </div>

                <button type="submit" class="btn btn-primary">Войти</button>
                <div class="loading" id="loginLoading">Загрузка...</div>
            </form>
        </div>

        <!-- Register Tab -->
        <div id="register" class="tab-content">
            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label class="form-label">Имя</label>
                    <input type="text" class="form-input" id="regName" placeholder="Ваше имя (необязательно)" autocomplete="name">
                </div>

                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" id="regEmail" placeholder="Введи email" required autocomplete="email" autofocus>
                </div>

                <div class="form-group">
                    <label class="form-label">Пароль</label>
                    <div class="form-input-with-icon">
                        <input type="password" class="form-input" id="regPassword" placeholder="Минимум 8 символов, буквы, цифры, спецсимволы" required autocomplete="new-password" oninput="checkPasswordStrength('regPassword', this.value)">
                        <button type="button" class="password-toggle" onclick="togglePassword('regPassword', this)" aria-label="Показать/скрыть пароль">👁️</button>
                    </div>
                    <div id="passwordStrength" class="password-strength-container"></div>
                </div>

                <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
                <div class="loading" id="regLoading">Загрузка...</div>
            </form>
        </div>

        <!-- Forgot Password Tab -->
        <div id="forgotPassword" class="tab-content" style="display: none;">
            <form onsubmit="handleForgotPassword(event)">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" id="forgotEmail" placeholder="Введи email для восстановления" required autocomplete="email" autofocus>
                </div>

                <button type="submit" class="btn btn-primary">Отправить ссылку</button>
                <button type="button" class="btn" onclick="switchAuthTab('login')" style="margin-top: 0.5rem; background: #f0f0f0; color: #333;">Назад к входу</button>
                <div class="loading" id="forgotLoading">Загрузка...</div>
            </form>
        </div>

        <!-- 2FA Verification Modal -->
        <div id="twoFactorModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
            <div style="background: white; padding: 2rem; border-radius: 12px; max-width: 400px; width: 90%;">
                <h3 style="margin-bottom: 1rem;">Двухфакторная аутентификация</h3>
                <p style="margin-bottom: 1rem; color: #666;">Введите код из приложения-аутентификатора</p>
                <input type="text" id="twoFactorCode" class="form-input" placeholder="6-значный код" maxlength="6" style="text-align: center; font-size: 1.5rem; letter-spacing: 0.5rem;">
                <div style="margin-top: 1rem; display: flex; gap: 0.5rem;">
                    <button type="button" class="btn btn-primary" onclick="handle2FAVerification()" style="flex: 1;">Подтвердить</button>
                    <button type="button" class="btn" onclick="close2FAModal()" style="background: #f0f0f0; color: #333;">Отмена</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin + '/api';

        // ===== CHECK IF ALREADY LOGGED IN =====
        // Проверяем при загрузке страницы
        window.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('access_token');
            
            // Если токен есть и валидный, переходим на dashboard
            if (token) {
                try {
                    const tokenData = JSON.parse(atob(token.split('.')[1]));
                    
                    // Проверяем, не истёк ли токен
                    if (tokenData.exp * 1000 > Date.now()) {
                        // Токен валидный, переходим на dashboard
                        window.location.replace('/dashboard.html');
                        return;
                    }
                } catch (e) {
                    console.error('Token error:', e);
                }
            }
            
            // Если токена нет или он невалидный, остаёмся на странице авторизации
        });

        // ===== TAB SWITCHING =====
        function switchAuthTab(tab) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(el => {
                el.classList.remove('active');
                el.style.display = 'none';
            });
            document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
            
            // Show selected tab
            const tabElement = document.getElementById(tab);
            if (tabElement) {
                tabElement.classList.add('active');
                tabElement.style.display = 'block';
            }
            
            const button = document.querySelector(`[onclick="switchAuthTab('${tab}')"]`);
            if (button) {
                button.classList.add('active');
            }
            
            // Clear alerts
            document.getElementById('alertContainer').innerHTML = '';
        }

        // ===== PASSWORD UTILITIES =====
        function togglePassword(inputId, button) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                button.textContent = '🙈';
                button.setAttribute('aria-label', 'Скрыть пароль');
            } else {
                input.type = 'password';
                button.textContent = '👁️';
                button.setAttribute('aria-label', 'Показать пароль');
            }
        }

        function checkPasswordStrength(inputId, password) {
            const strengthDiv = document.getElementById('passwordStrength');
            if (!strengthDiv) return;
            
            if (!password) {
                strengthDiv.innerHTML = '';
                return;
            }

            // Проверяем требования
            const requirements = {
                length: password.length >= 8,
                lowercase: /[a-z]/.test(password),
                uppercase: /[A-Z]/.test(password),
                numbers: /[0-9]/.test(password),
                special: /[!@#$%^&*(),.?":{}|<>_+\-=\[\]\\\/]/.test(password)
            };

            // Подсчитываем силу пароля
            let strength = 0;
            let maxStrength = 5;

            if (requirements.length) strength++;
            if (requirements.lowercase) strength++;
            if (requirements.uppercase) strength++;
            if (requirements.numbers) strength++;
            if (requirements.special) strength++;

            // Дополнительные бонусы за длину
            if (password.length >= 12) strength = Math.min(strength + 1, maxStrength);
            if (password.length >= 16) strength = Math.min(strength + 1, maxStrength);

            const strengthLabels = ['Очень слабый', 'Слабый', 'Средний', 'Хороший', 'Отличный', 'Превосходный'];
            const strengthColors = ['#e74c3c', '#e67e22', '#f39c12', '#27ae60', '#2ecc71', '#16a085'];
            const strengthPercentages = [0, 20, 40, 60, 80, 100];

            const currentStrength = Math.min(strength, maxStrength);
            const strengthLabel = strengthLabels[currentStrength] || 'Очень слабый';
            const strengthColor = strengthColors[currentStrength] || '#e74c3c';
            const strengthPercentage = strengthPercentages[currentStrength] || 0;

            // Формируем список требований
            const requirementLabels = {
                length: 'Минимум 8 символов',
                lowercase: 'Строчные буквы (a-z)',
                uppercase: 'Заглавные буквы (A-Z)',
                numbers: 'Цифры (0-9)',
                special: 'Спецсимволы (!@#$%...)'
            };

            const requirementsHTML = Object.keys(requirements).map(key => {
                const met = requirements[key];
                const label = requirementLabels[key];
                return `<span class="requirement ${met ? 'met' : 'unmet'}">${met ? '✓' : '✗'} ${label}</span>`;
            }).join('');

            strengthDiv.innerHTML = `
                <div class="password-strength-bar">
                    <div class="password-strength-progress">
                        <div class="password-strength-fill" style="width: ${strengthPercentage}%; background: ${strengthColor};"></div>
                    </div>
                    <span class="password-strength-label" style="color: ${strengthColor};">${strengthLabel}</span>
                </div>
                <div class="password-strength-feedback">
                    ${requirementsHTML}
                </div>
            `;

            // Возвращаем, соответствует ли пароль минимальным требованиям
            return strength >= 3 && requirements.length && (requirements.lowercase || requirements.uppercase) && requirements.numbers;
        }

        let pendingLoginData = null;

        // ===== LOGIN =====
        async function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            
            if (!email || !password) {
                showAlert('Заполни email и пароль', 'error');
                return;
            }

            showLoading('loginLoading', true);

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password, remember_me: rememberMe })
                });

                const data = await response.json();

                if (response.ok) {
                    // Проверка на 2FA
                    if (data.requires_2fa) {
                        pendingLoginData = { email, password, rememberMe };
                        document.getElementById('twoFactorModal').style.display = 'flex';
                        document.getElementById('twoFactorCode').focus();
                        showLoading('loginLoading', false);
                        return;
                    }
                    
                    // Сохраняем токены
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('refresh_token', data.refresh_token);
                    
                    // Сохраняем тему пользователя
                    if (data.theme) {
                        localStorage.setItem('theme', data.theme);
                    }
                    
                    showAlert(`✅ Добро пожаловать, ${data.email || email}!`, 'success');
                    
                    setTimeout(() => {
                        window.location.replace('/dashboard.html');
                    }, 500);
                } else {
                    const errorMsg = getErrorMessage(data, 'Ошибка входа');
                    showAlert(`❌ ${errorMsg}`, 'error', 6000);
                }
            } catch (e) {
                console.error('Login error:', e);
                const errorMsg = e.message || 'Не удалось подключиться к серверу. Проверьте подключение к интернету.';
                showAlert(`❌ ${errorMsg}`, 'error', 6000);
            } finally {
                showLoading('loginLoading', false);
            }
        }

        async function handle2FAVerification() {
            const code = document.getElementById('twoFactorCode').value;
            if (!code || code.length !== 6) {
                showAlert('Введите 6-значный код', 'error');
                return;
            }

            if (!pendingLoginData) {
                showAlert('Ошибка: данные входа не найдены', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/auth/verify-2fa`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: pendingLoginData.email,
                        password: pendingLoginData.password,
                        code: code,
                        remember_me: pendingLoginData.rememberMe
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('refresh_token', data.refresh_token);
                    
                    if (data.theme) {
                        localStorage.setItem('theme', data.theme);
                    }
                    
                    close2FAModal();
                    showAlert(`✅ Добро пожаловать, ${data.email || pendingLoginData?.email}!`, 'success');
                    
                    setTimeout(() => {
                        window.location.replace('/dashboard.html');
                    }, 500);
                } else {
                    const errorMsg = getErrorMessage(data, 'Неверный код');
                    showAlert(`❌ ${errorMsg}`, 'error', 6000);
                    // Очищаем поле кода при ошибке
                    document.getElementById('twoFactorCode').value = '';
                    document.getElementById('twoFactorCode').focus();
                }
            } catch (e) {
                console.error('2FA verification error:', e);
                const errorMsg = e.message || 'Не удалось подключиться к серверу. Проверьте подключение к интернету.';
                showAlert(`❌ ${errorMsg}`, 'error', 6000);
            }
        }

        function close2FAModal() {
            document.getElementById('twoFactorModal').style.display = 'none';
            document.getElementById('twoFactorCode').value = '';
            pendingLoginData = null;
        }

        function showForgotPassword() {
            switchAuthTab('forgotPassword');
        }

        // ===== REGISTER =====
        async function handleRegister(event) {
            event.preventDefault();
            
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            
            if (!email || !password) {
                showAlert('Заполни email и пароль', 'error');
                return;
            }

            // Проверка сложности пароля
            const isValidPassword = checkPasswordStrength('regPassword', password);
            if (!isValidPassword) {
                showAlert('Пароль не соответствует требованиям безопасности. Пароль должен содержать минимум 8 символов, буквы и цифры.', 'error');
                return;
            }

            showLoading('regLoading', true);

            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password, name: name || null })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert(`✅ Аккаунт создан! Проверьте email для подтверждения.`, 'success', 8000);
                    
                    // Показываем информацию о верификации (только для разработки)
                    if (data.verification_token) {
                        setTimeout(() => {
                            const verifyUrl = `${window.location.origin}/verify-email.html?token=${data.verification_token}`;
                            showAlert(`🔗 Токен верификации (для тестирования): <code style="background: rgba(0,0,0,0.1); padding: 0.2rem 0.4rem; border-radius: 4px; font-family: monospace;">${data.verification_token}</code><br><a href="${verifyUrl}" target="_blank" style="color: #007bff; text-decoration: underline;">Подтвердить email</a>`, 'success', 15000);
                        }, 1000);
                    }
                    
                    // Переключаемся на вкладку входа
                    setTimeout(() => {
                        switchAuthTab('login');
                        document.getElementById('loginEmail').value = email;
                        document.getElementById('loginEmail').focus();
                    }, 2000);
                } else {
                    const errorMsg = getErrorMessage(data, 'Ошибка регистрации');
                    showAlert(`❌ ${errorMsg}`, 'error', 6000);
                }
            } catch (e) {
                console.error('Registration error:', e);
                const errorMsg = e.message || 'Не удалось подключиться к серверу. Проверьте подключение к интернету.';
                showAlert(`❌ ${errorMsg}`, 'error', 6000);
            } finally {
                showLoading('regLoading', false);
            }
        }

        // ===== FORGOT PASSWORD =====
        async function handleForgotPassword(event) {
            event.preventDefault();
            
            const email = document.getElementById('forgotEmail').value;
            
            if (!email) {
                showAlert('Введите email', 'error');
                return;
            }

            showLoading('forgotLoading', true);

            try {
                const response = await fetch(`${API_URL}/auth/forgot-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('✅ Если email существует, ссылка для сброса пароля отправлена на указанный адрес. Проверьте почту.', 'success', 8000);
                    // Показываем токен для тестирования (только для разработки)
                    if (data.reset_token) {
                        setTimeout(() => {
                            showAlert(`🔗 Токен сброса (для тестирования): <code style="background: rgba(0,0,0,0.1); padding: 0.2rem 0.4rem; border-radius: 4px; font-family: monospace;">${data.reset_token}</code>`, 'success', 10000);
                        }, 1000);
                    }
                    // Очищаем поле email
                    document.getElementById('forgotEmail').value = '';
                } else {
                    const errorMsg = getErrorMessage(data, 'Ошибка при отправке запроса');
                    showAlert(`❌ ${errorMsg}`, 'error', 6000);
                }
            } catch (e) {
                console.error('Forgot password error:', e);
                const errorMsg = e.message || 'Не удалось подключиться к серверу. Проверьте подключение к интернету.';
                showAlert(`❌ ${errorMsg}`, 'error', 6000);
            } finally {
                showLoading('forgotLoading', false);
            }
        }

        // ===== UTILS =====
        function showAlert(message, type, duration = 5000) {
            const container = document.getElementById('alertContainer');
            
            // Удаляем предыдущие алерты того же типа
            const existingAlerts = container.querySelectorAll(`.alert-${type}`);
            existingAlerts.forEach(alert => alert.remove());
            
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.innerHTML = message;
            container.appendChild(alertDiv);
            
            // Прокручиваем к алерту
            alertDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            
            // Автоматическое удаление
            const timeout = setTimeout(() => {
                alertDiv.style.opacity = '0';
                alertDiv.style.transition = 'opacity 0.3s';
                setTimeout(() => alertDiv.remove(), 300);
            }, duration);
            
            // Возможность закрыть вручную
            const closeBtn = document.createElement('button');
            closeBtn.innerHTML = '×';
            closeBtn.style.cssText = 'float: right; background: none; border: none; font-size: 1.5rem; cursor: pointer; opacity: 0.7; padding: 0; margin-left: 1rem; line-height: 1;';
            closeBtn.onclick = () => {
                clearTimeout(timeout);
                alertDiv.style.opacity = '0';
                alertDiv.style.transition = 'opacity 0.3s';
                setTimeout(() => alertDiv.remove(), 300);
            };
            alertDiv.appendChild(closeBtn);
        }

        // Улучшенная обработка ошибок API
        function getErrorMessage(error, defaultMessage = 'Произошла ошибка') {
            if (typeof error === 'string') {
                return error;
            }
            
            if (error.detail) {
                if (typeof error.detail === 'string') {
                    return error.detail;
                }
                if (Array.isArray(error.detail)) {
                    return error.detail.map(e => e.msg || e.message || JSON.stringify(e)).join(', ');
                }
                if (error.detail.message) {
                    return error.detail.message;
                }
            }
            
            if (error.message) {
                return error.message;
            }
            
            return defaultMessage;
        }

        function showLoading(elementId, show) {
            const el = document.getElementById(elementId);
            if (show) {
                el.classList.add('active');
            } else {
                el.classList.remove('active');
            }
        }
    </script>
</body>
