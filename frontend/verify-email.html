<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подтверждение email - Marketplace Manager</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .verify-container {
            max-width: 500px;
            margin: 5rem auto;
            padding: 2rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .verify-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        .verify-status {
            font-size: 1.2rem;
            margin: 1rem 0;
            padding: 1rem;
            border-radius: 8px;
        }
        .verify-status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .verify-status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .verify-status.loading {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        .btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            margin-top: 1rem;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <div class="verify-container">
        <div class="verify-icon" id="verifyIcon">⏳</div>
        <h1>Подтверждение email</h1>
        <div id="verifyStatus" class="verify-status loading">
            Проверка токена...
        </div>
        <div id="verifyActions" style="display: none;">
            <a href="index.html" class="btn">Вернуться на главную</a>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin + '/api';
        
        async function verifyEmail() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            
            if (!token) {
                document.getElementById('verifyIcon').textContent = '❌';
                document.getElementById('verifyStatus').className = 'verify-status error';
                document.getElementById('verifyStatus').textContent = 'Токен подтверждения не найден в URL';
                document.getElementById('verifyActions').style.display = 'block';
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/auth/verify-email`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ token })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    document.getElementById('verifyIcon').textContent = '✅';
                    document.getElementById('verifyStatus').className = 'verify-status success';
                    document.getElementById('verifyStatus').textContent = 'Email успешно подтвержден! Теперь вы можете войти в систему.';
                    document.getElementById('verifyActions').style.display = 'block';
                } else {
                    document.getElementById('verifyIcon').textContent = '❌';
                    document.getElementById('verifyStatus').className = 'verify-status error';
                    document.getElementById('verifyStatus').textContent = data.detail || 'Ошибка при подтверждении email. Токен может быть недействительным или истекшим.';
                    document.getElementById('verifyActions').style.display = 'block';
                }
            } catch (e) {
                document.getElementById('verifyIcon').textContent = '❌';
                document.getElementById('verifyStatus').className = 'verify-status error';
                document.getElementById('verifyStatus').textContent = 'Ошибка подключения к серверу. Проверьте подключение к интернету.';
                document.getElementById('verifyActions').style.display = 'block';
            }
        }
        
        // Запускаем проверку при загрузке страницы
        verifyEmail();
    </script>
</body>
</html>
